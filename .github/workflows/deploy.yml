name: Deploy

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  HUGO_VERSION: 0.142.0

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install Hugo
        run: |
          set -euo pipefail
          curl -fsSLO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          curl -fsSLO "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_${HUGO_VERSION}_checksums.txt"
          grep "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" "hugo_${HUGO_VERSION}_checksums.txt" | sha256sum --check --
          mkdir -p "${HOME}/.local/hugo"
          tar -C "${HOME}/.local/hugo" -xf "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          rm "hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" "hugo_${HUGO_VERSION}_checksums.txt"
          echo "${HOME}/.local/hugo" >> "${GITHUB_PATH}"

      - name: Cache Resume
        id: cache-resume
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: resume/main.pdf
          key: ${{ runner.os }}-resume-${{ hashFiles('resume/main.tex') }}

      - name: Compile resume
        if: steps.cache-resume.outputs.cache-hit != 'true'
        uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b
        with:
          root_file: main.tex
          working_directory: resume
          docker_image: ghcr.io/xu-cheng/texlive-alpine@sha256:8b4a00b6a17ebe6b96dee107d82f0cb3eb40daf322f1e23809a9be26486963dd

      - name: Add resume
        run: cp resume/main.pdf static/resume.pdf

      - name: Restore Hugo cache
        id: restore-hugo-cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-${{ github.run_id }}
          restore-keys: hugo-

      - name: Build
        run: hugo --gc --minify --cacheDir "${{ runner.temp }}/hugo_cache"

      - name: Save Hugo cache
        id: save-hugo-cache
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: ${{ steps.restore-hugo-cache.outputs.cache-primary-key }}

      - name: Upload
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: ./public

      - name: Deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
